name: sendspin-latest

on:
  workflow_dispatch: # https://github.com/armsurvivors/kodi-rockchip-deb/actions/workflows/sendspin-latest.yml
  #push:
  #  branches: [ main ]

permissions:
  packages: write # push the container image to ghcr.io
  contents: read

jobs:

  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare release ID
        id: prep
        run: |
          echo ::set-output name=created::$(date -u +'%Y%m%d-%H%M')
    outputs:
      created: ${{ steps.prep.outputs.created }} # refer to as ${{needs.prepare.outputs.created}}

  build:
    needs: [ prepare ]
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false # let other jobs try to complete if one fails
      matrix:
        arch: [ { name: 'arm64', runner: "ubuntu-24.04-arm" } ]
        distro:
          #- { id: 'bookworm', image: 'debian:bookworm' }
          - { id: 'trixie', image: 'debian:trixie' }
          - { id: 'forky', image: 'debian:forky' }
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      # Login to ghcr.io to push the container image
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.arch.name }} ${{ matrix.distro.id }} (container image)
        uses: docker/build-push-action@v7
        timeout-minutes: 30
        with:
          context: .
          file: ./Dockerfile.sendspin
          platforms: linux/${{ matrix.arch.name }}
          load: false
          pull: true # bring in updated versions of preexisting GH images
          push: true
          tags: ghcr.io/${{ github.repository }}/sendspin:${{ matrix.distro.id }}-latest
          build-args: |
            PACKAGE_VERSION=${{needs.prepare.outputs.created}}
            BASE_IMAGE=${{ matrix.distro.image }}
